services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: praesid-postgres
    environment:
      POSTGRES_USER: praesid
      POSTGRES_PASSWORD: praesid
      POSTGRES_DB: praesid
    ports:
      - "5432:5432"
    volumes:
      - praesid-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: praesid-redis
    ports:
      - "6379:6379"
    volumes:
      - praesid-redis-data:/data

volumes:
  praesid-postgres-data:
  praesid-redis-data:
